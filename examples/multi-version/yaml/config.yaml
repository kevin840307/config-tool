version: 1
variable_map_file: variable-map.yaml
options:
  yaml_output:
    mapping: 2
    sequence: 4
    offset: 2
    line_ending: preserve
rules:
  - id: upgrade-application
    filters:
      path_allow: ["FAB14-FZ1/STAGING/app/application.yaml"]
    operations:
      - op: remove_item
        path: $.versions
        match: {version: "2025.10"}
        on_zero_matches: ignore
        remove_leading_comments: true
      - op: copy_item
        path: $.versions
        source:
          match: {version: "2026.01"}
          expect_matches: 1
        set:
          version: "{{ NEW_VERSION }}"
          status: candidate
          parameters.retry: "{{ NEW_RETRY }}"
        item_operations:
          - op: insert_key
            path: $.parameters
            key: newParameter
            value: "{{ NEW_FEATURE }}"
            position: {last: true}
          - op: insert_key
            path: $.sections
            key: featureFlags
            value: {enabled: true, mode: safe}
            position: {last: true}
        duplicate:
          unique_by: [version]
          policy: skip
        copy_leading_comments: false
        position:
          after:
            match: {version: "2026.01"}
            expect_matches: 1
      - op: update_item
        path: $.versions
        match: {version: "2026.01"}
        expect_matches: 1
        set:
          parameters.timeout: "{{ OLD_TIMEOUT }}"
          parameters.compatibility: legacy-compatible
