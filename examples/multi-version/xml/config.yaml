version: 1
format: xml
variable_map_file: variable-map.yaml
options:
  xml_output:
    line_ending: preserve
rules:
  - id: upgrade-application
    filters:
      path_allow: ["FAB14-FZ1/STAGING/app/application.xml"]
    operations:
      - op: remove_item
        path: /application/versions
        element: version
        match: {'@id': '2025.10'}
        on_zero_matches: ignore
        remove_leading_comments: true
      - op: copy_item
        path: /application/versions
        element: version
        source:
          match: {'@id': '2026.01'}
          expect_matches: 1
        set:
          '@id': "{{ NEW_VERSION }}"
          '@status': candidate
          parameters.retry: "{{ NEW_RETRY }}"
          parameters.newParameter: "{{ NEW_FEATURE }}"
          sections.featureFlags.enabled: "true"
          sections.featureFlags.mode: safe
        duplicate:
          unique_by: ['@id']
          policy: skip
        position:
          after:
            match: {'@id': '2026.01'}
      - op: update_item
        path: /application/versions
        element: version
        match: {'@id': '2026.01'}
        expect_matches: 1
        set:
          parameters.timeout: "{{ OLD_TIMEOUT }}"
          parameters.compatibility: legacy-compatible
