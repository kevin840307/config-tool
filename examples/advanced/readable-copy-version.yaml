version: 1
variables:
  SOURCE_VERSION: "OCAP-2025.6.123456789"
  TARGET_VERSION: "OCAP-2025.4.987654321"

# defaults 可避免每個 operation 重複寫相同 path / expect_matches
defaults:
  target: $.db
  expect_matches: 1

operations:
  # 簡寫：from=find source、change=set、after_source=放在來源後面
  - id: copy-version
    op: copy_item
    from:
      version: "{{ SOURCE_VERSION }}"
    change:
      version: "{{ TARGET_VERSION }}"
    after_source: true
    duplicate:
      unique_by: [version]
      policy: error
