spring:
  application:
    name: appB
  profiles:
    active: stg,f13
  config:
    import:
      - optional:configtree:/mnt/secrets-store/
      - optional:file:/workspace/config/
  datasource:
    url: jdbc:postgresql://db-fab13-stg/appB
    username: appB
    hikari:
      minimum-idle: 5
      maximum-pool-size: 30
      connection-timeout: 30000
  kafka:
    bootstrap-servers:
      - kafka-1:9092
      - kafka-2:9092
    consumer:
      group-id: appB-v601
      max-poll-records: 1000
platform:
  fab: fab13
  fab-short: f13
  environment: stg
  namespace: name-f13-stg
  version: v604
  phases:
    - p1
    - p2
    - f13p1
  paths:
    config: /workspace/config/appB/v604/application.yaml
    log: /workspace/config/appB/v604/log.xml
  releasePolicy:
    oldVersion: v601
    currentVersion: v603
    newVersion: v604
    removeOld: true
    copyCurrent: true
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
  endpoint:
    health:
      probes:
        enabled: true
logging:
  level:
    root: WARN
    org.springframework: WARN
  pattern:
    console: '%d %-5level [%X{phase}] %msg%n'
