              search: '{{ current_version }}'
              replacement: '{{ new_version }}'
          from:
            name: '{{ current_version }}'
          after:
            name: '{{ current_version }}'
          merge:
            config:
              migration:
                enabled: true
                sourceVersion: '{{ old_version }}'
                targetVersion: '{{ new_version }}'
                strategy: rolling
        - op: remove_item
          path: $/apps/appA/phases/*/versions
          match:
            name: '{{ old_version }}'
        - op: update_item
          path: $/apps/appA/phases/p1/versions
          match:
