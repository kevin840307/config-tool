  values.yaml:
    format: yaml
    config:
      version: 1
      defaults_profile: concise-v1
      options:
        atomic_write: true
      operations:
        - op: copy_item
          path: $/apps/appA/phases/p1/versions
          set:
            name: '{{ new_version }}'
          item_operations:
            - op: replace
              path: $/image/tag
              value: 2026.03.1
            - op: replace_value
              path: $/resources/requests/cpu
              search: '25'
              replacement: '50'
            - op: replace
              path: $/autoscaling/maxReplicas
              value: 20
            - op: update_item
              path: $/containers
              match:
                name: main
              item_operations:
                - op: update_item
                  path: $/env
                  match:
                    name: CONFIG_VERSION
                  item_operations:
                    - op: replace_value
                      path: $/value
                      search: '{{ current_version }}'
                      replacement: '{{ new_version }}'
                  expect_matches: 1
              expect_matches: 1
            - op: update_item
              path: $/volumes
              match:
                name: spring-config
              item_operations:
                - op: replace_value
                  path: $/configMap/name
                  search: '{{ current_version }}'
                  replacement: '{{ new_version }}'
              expect_matches: 1
            - op: replace_value
