version: 1
kind: mixed-folder-patch-compact
formats:
  - yaml
  - xml
matched_files_only: false
files:
  config/appA/application.yaml:
    format: yaml
    config:
      version: 1
      defaults_profile: concise-v1
      options:
        atomic_write: true
      operations:
        - op: replace
          path: $/spring/datasource/hikari/maximum-pool-size
          value: 30
        - op: replace
          path: $/spring/kafka/consumer/max-poll-records
          value: 1000
        - op: insert_key
          path: $/platform
          key: releasePolicy
          value:
            oldVersion: '{{ old_version }}'
            currentVersion: '{{ current_version }}'
            newVersion: '{{ new_version }}'
            removeOld: true
            copyCurrent: true
          place:
            after_key: paths
        - op: replace_value
          search: '{{ current_version }}'
          replacement: '{{ new_version }}'
          paths:
            - $/platform/version
            - $/platform/paths/*
        - op: replace_value
          path: $/logging/level/root
          search: INFO
          replacement: WARN
    strategy: semantic
  config/appA/log.xml:
    format: xml
    config:
      version: 1
      defaults_profile: concise-v1
      format: xml
      options:
        atomic_write: true
      operations:
        - op: replace_value
          path: /configuration/*/@level
          search: INFO
          replacement: WARN
    strategy: structural-operations-exact
  config/appB/{{ old_version }}/application.yaml:
    format: yaml
    config:
      version: 1
      defaults_profile: concise-v1
      options:
