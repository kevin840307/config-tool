version: 1
variables:
  VERSION: "2026.4.123456789"
operations:
  - op: update_item
    path: $.spec.template.spec.containers
    match: {name: app}
    set:
      image: "registry/ocap:{{ VERSION }}"
    expect_matches: 1
  - op: insert_after
    path: $.spec.template.spec.containers[0].env
    match: {name: LOG_LEVEL}
    value:
      name: FEATURE_VERSION
      value: "{{ VERSION }}"
    expect_matches: 1
