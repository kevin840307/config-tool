version: 1

# FAB 與 ENV 都使用 startsWith。
# 越精確的 scope 越晚套用，因此會覆蓋一般 scope。
variable_map:
  "FAB14":
    XXX: "A"
    DB_HOST: "fab14-default-db"

  "FAB14-FZ1":
    XXX: "B"
    DB_HOST: "fab14-fz1-db"

  "FAB14-FZ1:STAGING":
    XXX: "C"
    DB_HOST: "fab14-fz1-staging-db"

rules:
  - id: update-app1
    filters:
      path_allow:
        - "eocap-app1/application.yaml"
      fab_allow_prefix:
        - "FAB14"
      env_allow:
        - "STAGING"

    operations:
      - op: set
        path: $.setting
        value: "{{ XXX }}"

      - op: set
        path: $.database.host
        value: "{{ DB_HOST }}"
