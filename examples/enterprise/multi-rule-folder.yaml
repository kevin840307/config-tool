version: 1

# copy_item 若未指定 position，預設插在來源上方。
defaults:
  copy_item_position: before_source

variables:
  SOURCE_VERSION: "508"
  TARGET_VERSION: "512"

rules:
  - id: app1-staging-add-version-A
    priority: 100
    filters:
      path_allow:
        - "eocap-app1/application.yaml"
      path_deny:
        - "**/backup/**"
      fab_allow_prefix:
        - "FAB14"
      fab_deny_prefix:
        - "FAB14-OLD"
      env_allow:
        - "STAGING"
      env_deny:
        - "DEV"
    operations:
      - op: copy_item
        path: $.db
        source:
          match:
            name: "config-v{{ SOURCE_VERSION }}-777"
          expect_matches: 1
        set:
          name: "config-v{{ TARGET_VERSION }}-777"
        item_operations:
          - op: rename_key
            path: $
            old_key: "config-v{{ SOURCE_VERSION }}-abc"
            new_key: "config-v{{ TARGET_VERSION }}-abc"

  - id: app2-staging-add-B
    priority: 90
    filters:
      path_allow:
        - "eocap-app2/application.yaml"
      fab_allow_prefix:
        - "FAB14"
      env_allow:
        - "STAGING"
    operations:
      - op: upsert_item
        path: $.db
        match:
          name: B
        value:
          name: B
          enabled: true
