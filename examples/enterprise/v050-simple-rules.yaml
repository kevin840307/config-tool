version: 1

options:
  conflict_policy: warn

defaults:
  copy_item_position: before_source

rules:
  - id: app1-version-upgrade
    priority: 100
    filters:
      path_allow: ["eocap-app1/application.yaml"]
      fab_allow_prefix: ["FAB14", "FAB18"]
      fab_deny_prefix: ["FAB14-OLD"]
      env_allow: ["STAGING", "PROD"]
    variables:
      SOURCE_VERSION: "508"
      TARGET_VERSION: "512"
    operations:
      - op: copy_item
        target: $.db
        from:
          name: "config-v{{ SOURCE_VERSION }}-777"
        change:
          name: "config-v{{ TARGET_VERSION }}-777"
        item_operations:
          - op: rename_key
            old_key: "config-v{{ SOURCE_VERSION }}-abc"
            new_key: "config-v{{ TARGET_VERSION }}-abc"
        # position omitted: copy_item defaults to before_source

  - id: app2-copy-settings
    priority: 90
    filters:
      path_allow: ["eocap-app2/application.yaml"]
      env_allow: ["STAGING"]
    operations:
      - op: copy_node
        from_path: $.db
        to_path: $.new-setting
        place:
          after_key: size

      - op: copy_item_to_node
        from_path: $.db
        source:
          match:
            version: "2025.6"
        to_path: $.new-setting2
        place:
          before_key: shadow
