version: 1
format: xml
operations:
  - op: set
    path: /configuration/orderService
    missing: create
    value:
      image: {repository: registry/order, tag: 2.4.0}
      resources:
        requests: {cpu: 250m, memory: 512Mi}
        limits: {cpu: "1", memory: 1Gi}
      routes:
        route:
          - {path: /orders, method: GET}
          - {path: /orders, method: POST}
  - op: update_item
    path: /configuration/components
    element: component
    name_pattern: "api-*"
    missing: skip
    on_multiple_matches: all
    set:
      config.timeout: "45"
      config.retry: {count: "5", backoff: {seconds: ["1", "5", "15"]}}
