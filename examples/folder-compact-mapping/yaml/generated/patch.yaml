version: 1
kind: yaml-folder-patch-compact
variable_map_file: variable-map.yaml
files:
  FAB14-FZ1/STAGING/app/application.yaml:
    ops:
      - set: [$.server.host, "{{ HOST }}"]
      - set: [$.server.timeout, "{{ TIMEOUT }}"]
      - op: set
        path: $.runtime
        missing: create
        value:
          retry:
            count: 3
            delays: [1, 5, 15]
summary: {patch: 1, create: 0, delete: 0, unchanged: 0}
